name: Publish to PyPI

# Publishes to PyPI whenever you cut a GitHub Release. No stored token:
# it authenticates to PyPI via OIDC (trusted publishing). Set up the matching
# pending publisher on PyPI (project binderqc, repo ssiddhantsharma/binderqc,
# workflow publish.yml) before the first release.

on:
  release:
    types: [published]
  workflow_dispatch:      # allow manual runs (and re-runs) from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
